name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download and bundle Python 3.12 for macOS
        run: |
          BUNDLE_DIR="python/bundle"
          FRAMEWORK_DIR="$BUNDLE_DIR/Python.framework"
          # python.org 提供 .pkg（XAR 格式），包含 Framework
          PKG_URL="https://www.python.org/ftp/python/3.12.9/python-3.12.9-macos11.pkg"

          if [ ! -f "$FRAMEWORK_DIR/Versions/3.12/bin/python3.12" ]; then
            echo "Downloading Python 3.12 .pkg..."
            curl -sL "$PKG_URL" -o /tmp/python-3.12.pkg
            echo "Extracting XAR package..."
            mkdir -p /tmp/python-extract
            xar -xf /tmp/python-3.12.pkg -C /tmp/python-extract
            # .pkg 内 Payload 是 cpio+gzip 压缩的 Python.framework
            mkdir -p "$FRAMEWORK_DIR"
            cat /tmp/python-extract/*.pkg/Payload 2>/dev/null | gzip -dc | cpio -idm -p "$FRAMEWORK_DIR" 2>&1 | tail -3
            # 如果上面的方式失败，尝试直接复制
            if [ ! -f "$FRAMEWORK_DIR/Versions/3.12/bin/python3.12" ]; then
              FRAMEWORK_SRC=$(find /tmp/python-extract -name "Python.framework" -type d 2>/dev/null | head -1)
              if [ -n "$FRAMEWORK_SRC" ]; then
                cp -R "$FRAMEWORK_SRC" "$FRAMEWORK_DIR"
              fi
            fi
            echo "Bundle framework:"
            ls "$FRAMEWORK_DIR/Versions/3.12/bin/" 2>/dev/null | grep python || echo "NOT FOUND"
            rm -rf /tmp/python-extract /tmp/python-3.12.pkg
          else
            echo "Python already bundled, skipping."
          fi

          if [ -f "$FRAMEWORK_DIR/Versions/3.12/bin/python3.12" ]; then
            echo "Installing openpyxl..."
            "$FRAMEWORK_DIR/Versions/3.12/bin/python3.12" -m pip install openpyxl --quiet
            echo "Done. Python version:"
            "$FRAMEWORK_DIR/Versions/3.12/bin/python3.12" --version
          else
            echo "ERROR: python3.12 not found in bundle"
            ls "$FRAMEWORK_DIR/" 2>/dev/null || echo "Framework dir empty"
            find "$BUNDLE_DIR" -name "python*" -type f 2>/dev/null | head -5
            exit 1
          fi

      - name: Install Node deps
        run: npm ci

      - name: Build macOS DMG (arm64 + x64)
        run: npm run dist:mac
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download, install Python + openpyxl, bundle into build
        run: |
          $pythonInstaller = "python-3.12.9-amd64.exe"
          $installDir = "$env:TEMP\python-bundle"
          $bundleDir = "python\bundle"
          if (!(Test-Path "$installDir\python.exe")) {
            Write-Host "Downloading Python full installer..."
            curl -sL "https://www.python.org/ftp/python/3.12.9/$pythonInstaller" -o $pythonInstaller
            Write-Host "Installing Python silently to $installDir..."
            Start-Process -FilePath ".\$pythonInstaller" -ArgumentList "/quiet","InstallAllUsers=0","PrependPath=1","TargetDir=$installDir" -Wait
            Remove-Item $pythonInstaller
          }
          Write-Host "Installing openpyxl..."
          & "$installDir\python.exe" -m pip install openpyxl
          Write-Host "Bundling into python/bundle..."
          mkdir -Force $bundleDir
          Copy-Item "$installDir\*" "$bundleDir\" -Recurse -Force
          Write-Host "Done. Bundle:"
          Get-ChildItem $bundleDir | Select-Object Name

      - name: Install Node deps
        run: npm ci

      - name: Build Windows NSIS
        run: npm run dist:win
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: dist-electron/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare installers
        run: |
          mkdir -p artifacts/installers
          cp artifacts/macos-dmg/*.dmg artifacts/installers/ 2>/dev/null || true
          cp artifacts/windows-nsis/*.exe artifacts/installers/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/installers/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
