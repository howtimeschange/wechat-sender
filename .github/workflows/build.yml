name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── python-build-standalone（temu-assistant 同款方案）──────────────
      - name: Download and bundle Python 3.12 for macOS
        run: |
          VERSION="20260310"
          PY_VERSION="3.12.13"
          BASE="https://github.com/astral-sh/python-build-standalone/releases/download/${VERSION}"
          PROXY="${GITHUB_PROXY:-}"

          FILE="cpython-${PY_VERSION}+${VERSION}-aarch64-apple-darwin-install_only_stripped.tar.gz"
          DEST="python/bundle"
          mkdir -p "$DEST"
          echo "Downloading macOS arm64 Python ${PY_VERSION}..."
          curl -L -o /tmp/$FILE "${PROXY}${BASE}/${FILE}" --progress-bar
          echo "Extracting..."
          tar -xzf /tmp/$FILE -C "$DEST" --strip-components=1
          rm -f /tmp/$FILE
          echo "Python bin:"
          ls "$DEST/bin/"
          echo "Installing openpyxl..."
          "$DEST/bin/pip3" install openpyxl --quiet
          echo "Done. Python version:"
          "$DEST/bin/python3" --version

      - name: Install Node deps
        run: npm ci

      - name: Build macOS DMG (arm64 + x64)
        run: npm run dist:mac
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download and bundle Python 3.12 for Windows
        run: |
          $version = "20260310"
          $pyVersion = "3.12.13"
          $base = "https://github.com/astral-sh/python-build-standalone/releases/download/$version"
          $file = "cpython-$pyVersion+$version-x86_64-pc-windows-msvc-install_only_stripped.tar.gz"
          $tmp = "$env:TEMP\$file"
          $dest = "python\bundle"
          Write-Host "Downloading Windows Python ${pyVersion} to ${tmp}..."
          curl -L -o $tmp "$base/$file" --progress-bar
          Write-Host "Extracting..."
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          tar -xzf $tmp -C $dest --strip-components=1
          Remove-Item $tmp
          Write-Host "Python:"
          Get-ChildItem "$dest" -Name
          Write-Host "Installing dependencies..."
          & "$dest\python.exe" -m pip install openpyxl uiautomation pyperclip pywin32 Pillow --quiet --no-warn-script-location
          Write-Host "Done. Python version:"
          & "$dest\python.exe" --version

      - name: Install Node deps
        run: npm ci

      - name: Build Windows NSIS
        run: npm run dist:win
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: dist-electron/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare installers
        run: |
          mkdir -p artifacts/installers
          cp artifacts/macos-dmg/*.dmg artifacts/installers/ 2>/dev/null || true
          cp artifacts/windows-nsis/*.exe artifacts/installers/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/installers/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
