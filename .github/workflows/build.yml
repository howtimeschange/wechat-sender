name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download and bundle Python 3.12 + openpyxl for macOS
        run: |
          PYTHON_PKG="python-3.12.9-macos11.pkg"
          INSTALL_DIR="$HOME/python-install"
          BUNDLE_DIR="python/bundle"
          FRAMEWORK_SRC="$INSTALL_DIR/Library/Frameworks/Python.framework"
          FRAMEWORK_DST="$BUNDLE_DIR/Python.framework"

          if [ ! -f "$FRAMEWORK_DST/Versions/3.12/Python" ]; then
            echo "Downloading macOS Python 3.12..."
            curl -sL "https://www.python.org/ftp/python/3.12.9/$PYTHON_PKG" -o "/tmp/$PYTHON_PKG"
            echo "Installing Python to $INSTALL_DIR..."
            sudo installer -pkg "/tmp/$PYTHON_PKG" -target "$INSTALL_DIR"
            rm -f "/tmp/$PYTHON_PKG"
            echo "Copying Python.framework to bundle..."
            mkdir -p "$BUNDLE_DIR"
            cp -R "$FRAMEWORK_SRC" "$FRAMEWORK_DST"
            echo "Python.framework copied"
          else
            echo "Python already bundled, skipping download"
          fi

          echo "Installing openpyxl into bundled Python..."
          "$FRAMEWORK_DST/Versions/3.12/bin/python3" -m pip install openpyxl --quiet
          echo "Done. Bundle Python version:"
          "$FRAMEWORK_DST/Versions/3.12/bin/python3" --version

      - name: Install Node deps
        run: npm ci

      - name: Build macOS DMG (arm64 + x64)
        run: npm run dist:mac
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download, install Python + openpyxl, bundle into build
        run: |
          $pythonInstaller = "python-3.12.9-amd64.exe"
          $installDir = "$env:TEMP\python-bundle"
          $bundleDir = "python\bundle"
          if (!(Test-Path "$installDir\python.exe")) {
            Write-Host "Downloading Python full installer..."
            curl -sL "https://www.python.org/ftp/python/3.12.9/$pythonInstaller" -o $pythonInstaller
            Write-Host "Installing Python silently to $installDir..."
            Start-Process -FilePath ".\$pythonInstaller" -ArgumentList "/quiet","InstallAllUsers=0","PrependPath=1","TargetDir=$installDir" -Wait
            Remove-Item $pythonInstaller
          }
          Write-Host "Installing openpyxl..."
          & "$installDir\python.exe" -m pip install openpyxl
          Write-Host "Bundling into python/bundle..."
          mkdir -Force $bundleDir
          Copy-Item "$installDir\*" "$bundleDir\" -Recurse -Force
          Write-Host "Done. Bundle:"
          Get-ChildItem $bundleDir | Select-Object Name

      - name: Install Node deps
        run: npm ci

      - name: Build Windows NSIS
        run: npm run dist:win
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: dist-electron/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare installers
        run: |
          mkdir -p artifacts/installers
          cp artifacts/macos-dmg/*.dmg artifacts/installers/ 2>/dev/null || true
          cp artifacts/windows-nsis/*.exe artifacts/installers/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/installers/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
