name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps (openpyxl)
        run: pip install openpyxl

      - name: Install Node deps
        run: npm ci

      - name: Build macOS DMG (arm64 + x64)
        run: npm run dist:mac
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Python standalone
        run: |
          $pythonZip = "python-3.12.9-embed-amd64.zip"
          $pythonDir = "python-3.12.9-embed-amd64"
          if (!(Test-Path $pythonDir)) {
            curl -sL "https://www.python.org/ftp/python/3.12.9/$pythonZip" -o $pythonZip
            Expand-Archive -Force $pythonZip .
            Remove-Item $pythonZip
          }

      - name: Install pip and openpyxl
        run: |
          $pythonDir = "python-3.12.9-embed-amd64"
          # bootstrap pip
          $pipInstaller = "get-pip.py"
          curl -sL "https://bootstrap.pypa.io/get-pip.py" -o $pipInstaller
          & "$pythonDir\python.exe" $pipInstaller
          Remove-Item $pipInstaller
          # install openpyxl + dependencies
          & "$pythonDir\Scripts\pip.exe" install openpyxl

      - name: Bundle Python into build
        run: |
          $pythonDir = "python-3.12.9-embed-amd64"
          # Copy bundled Python into build/python/ so electron-builder picks it up
          mkdir -Force "python\bundle"
          Copy-Item "$pythonDir\*" "python\bundle\" -Recurse

      - name: Install Node deps
        run: npm ci

      - name: Build Windows NSIS
        run: npm run dist:win
        env:
          ELECTRON_CACHE: /tmp/electron-cache
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: dist-electron/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare installers
        run: |
          mkdir -p artifacts/installers
          cp artifacts/macos-dmg/*.dmg artifacts/installers/ 2>/dev/null || true
          cp artifacts/windows-nsis/*.exe artifacts/installers/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/installers/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
